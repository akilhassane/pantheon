<!DOCTYPE html>
<html>
<head>
    <title>Windows Terminal</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', monospace;
        }
        #terminal {
            width: 100%;
            height: 100%;
            padding: 10px;
            color: #0f0;
            background-color: #000;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        #status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid #0f0;
            border-radius: 3px;
            font-size: 12px;
            color: #0f0;
        }
    </style>
</head>
<body>
    <div id="status">Connecting...</div>
    <div id="terminal"></div>

    <script>
        const terminal = document.getElementById('terminal');
        const status = document.getElementById('status');
        let ws;

        function connect() {
            // Auto-detect protocol: use wss:// for HTTPS, ws:// for HTTP
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const hostname = window.location.hostname;
            const port = window.location.port || (protocol === 'wss:' ? '443' : '8006');
            
            // For Cloudflare tunnels, don't include port in URL
            const portSuffix = (protocol === 'wss:' && port === '443') || (protocol === 'ws:' && port === '80') 
                ? '' 
                : `:${port}`;
            
            const url = `${protocol}//${hostname}${portSuffix}/status`;
            
            console.log('🔗 Terminal WebSocket Connection:', {
                protocol: window.location.protocol,
                wsProtocol: protocol,
                hostname,
                port,
                fullUrl: url
            });

            ws = new WebSocket(url);

            ws.onopen = () => {
                console.log('✓ Connected to terminal');
                status.textContent = 'Connected';
                status.style.background = 'rgba(0, 255, 0, 0.2)';
            };

            ws.onmessage = (event) => {
                terminal.textContent += event.data;
                terminal.scrollTop = terminal.scrollHeight;
            };

            ws.onerror = (error) => {
                console.error('✗ WebSocket error:', error);
                status.textContent = 'Error';
                status.style.background = 'rgba(255, 0, 0, 0.2)';
                status.style.borderColor = '#f00';
                status.style.color = '#f00';
            };

            ws.onclose = () => {
                console.log('✗ Disconnected from terminal');
                status.textContent = 'Disconnected - Reconnecting...';
                status.style.background = 'rgba(255, 255, 0, 0.2)';
                status.style.borderColor = '#ff0';
                status.style.color = '#ff0';
                setTimeout(connect, 3000);
            };
        }

        // Handle keyboard input
        document.addEventListener('keydown', (e) => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(e.key);
            }
        });

        connect();
    </script>
</body>
</html>
