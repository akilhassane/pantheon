<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        #terminal-container {
            width: 100%;
            height: 100%;
        }
        #status {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 3px;
        }
        .error {
            color: #f00 !important;
        }
    </style>
</head>
<body>
    <div id="status">Connecting...</div>
    <div id="terminal-container"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    
    <script>
        // Get project ID from URL path
        const pathParts = window.location.pathname.split('/');
        const projectIdIndex = pathParts.indexOf('proxy') + 1;
        const projectId = pathParts[projectIdIndex];
        
        console.log('🔧 Terminal Proxy Initializing');
        console.log('   Project ID:', projectId);
        console.log('   Current URL:', window.location.href);
        
        const status = document.getElementById('status');
        
        // Initialize xterm.js
        const term = new Terminal({
            cursorBlink: true,
            fontSize: 14,
            fontFamily: 'Consolas, "Courier New", monospace',
            theme: {
                background: '#000000',
                foreground: '#ffffff'
            },
            allowProposedApi: true
        });
        
        const fitAddon = new FitAddon.FitAddon();
        const webLinksAddon = new WebLinksAddon.WebLinksAddon();
        
        term.loadAddon(fitAddon);
        term.loadAddon(webLinksAddon);
        term.open(document.getElementById('terminal-container'));
        fitAddon.fit();
        
        // Handle window resize
        window.addEventListener('resize', () => {
            fitAddon.fit();
        });
        
        // Build WebSocket URL through backend proxy
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/api/proxy/${projectId}/terminal/ws`;
        
        console.log('🔌 Connecting to WebSocket:', wsUrl);
        status.textContent = 'Connecting to ' + wsUrl;
        
        let ws;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 5;
        
        function connect() {
            try {
                ws = new WebSocket(wsUrl);
                
                ws.onopen = () => {
                    console.log('✅ WebSocket connected');
                    status.textContent = 'Connected';
                    status.classList.remove('error');
                    setTimeout(() => {
                        status.style.display = 'none';
                    }, 2000);
                    reconnectAttempts = 0;
                    
                    // Send terminal size
                    const size = { cols: term.cols, rows: term.rows };
                    ws.send(JSON.stringify({ type: 'resize', ...size }));
                };
                
                ws.onmessage = (event) => {
                    // Write data to terminal
                    term.write(event.data);
                };
                
                ws.onerror = (error) => {
                    console.error('❌ WebSocket error:', error);
                    status.textContent = 'Connection error';
                    status.classList.add('error');
                    status.style.display = 'block';
                };
                
                ws.onclose = () => {
                    console.log('🔌 WebSocket closed');
                    status.textContent = 'Connection closed';
                    status.classList.add('error');
                    status.style.display = 'block';
                    
                    // Attempt to reconnect
                    if (reconnectAttempts < maxReconnectAttempts) {
                        reconnectAttempts++;
                        const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 10000);
                        console.log(`🔄 Reconnecting in ${delay}ms (attempt ${reconnectAttempts}/${maxReconnectAttempts})`);
                        status.textContent = `Reconnecting in ${delay/1000}s... (${reconnectAttempts}/${maxReconnectAttempts})`;
                        setTimeout(connect, delay);
                    } else {
                        status.textContent = 'Connection failed. Please refresh.';
                    }
                };
                
                // Send terminal input to WebSocket
                term.onData((data) => {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(data);
                    }
                });
                
                // Send resize events
                term.onResize((size) => {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: 'resize', cols: size.cols, rows: size.rows }));
                    }
                });
                
            } catch (error) {
                console.error('❌ Failed to create WebSocket:', error);
                status.textContent = 'Failed to connect: ' + error.message;
                status.classList.add('error');
                status.style.display = 'block';
            }
        }
        
        // Start connection
        connect();
    </script>
</body>
</html>
