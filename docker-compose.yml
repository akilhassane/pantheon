services:
  # MCP Pentest Forge Server
  mcp-pentest-forge:
    build: .
    container_name: mcp-pentest-forge
    stdin_open: true
    tty: true
    restart: unless-stopped
    network_mode: host  # Use host network to access real network devices
    environment:
      - NODE_ENV=production
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # Allow docker exec to Kali container
    labels:
      - "description=MCP Pentest Forge Server"

  # Kali Linux Pentesting Environment
  kali-pentest:
    build:
      context: .
      dockerfile: Dockerfile.kali
    container_name: kali-pentest
    hostname: kali-pentest
    stdin_open: true
    tty: true
    restart: unless-stopped
    network_mode: host  # Use host network for real network scanning
    privileged: false
    cap_add:
      - NET_RAW      # Required for raw packet manipulation (nmap, etc.)
      - NET_ADMIN    # Required for network administration tasks
    environment:
      - TERM=xterm-256color
    volumes:
      - ./workspace:/workspace
      - ./tools:/tools
    labels:
      - "description=Kali Linux Pentesting Environment"
