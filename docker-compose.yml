services:
  mcp-pentest-forge:
    build: .
    container_name: mcp-pentest-forge
    stdin_open: true
    tty: true
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    labels:
      - "description=MCP Pentest Forge Server"
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: bridge
    name: mcp-pentest-forge-network
