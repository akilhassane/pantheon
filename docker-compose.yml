services:
  # MCP Pentest Forge Server
  mcp-pentest-forge:
    build: .
    container_name: mcp-pentest-forge
    stdin_open: true
    tty: true
    restart: unless-stopped
    ports:
      - "8811:8811"  # Expose HTTP port 8811 for n8n/remote access
    environment:
      - NODE_ENV=production
      - HTTP_PORT=8811
      - SERVER_HOST=0.0.0.0
      - SERVER_URL=http://192.168.100.48:8811
      - KALI_SSH_HOST=kali-pentest
      - KALI_SSH_PORT=22
      - KALI_SSH_USER=${KALI_SSH_USER:-pentester}
      - KALI_SSH_PASSWORD=${KALI_SSH_PASSWORD:-pentester}
      - API_KEY=${API_KEY:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - COMMAND_TIMEOUT=${COMMAND_TIMEOUT:-600000}
    depends_on:
      - kali-pentest
    labels:
      - "description=MCP Pentest Forge Server"
      - "docs=https://github.com/akilhassane/mcp-pentest-forge"

  # Kali Linux Pentesting Environment
  kali-pentest:
    build:
      context: .
      dockerfile: Dockerfile.kali
    container_name: kali-pentest
    hostname: kali-pentest
    stdin_open: true
    tty: true
    restart: unless-stopped
    privileged: false
    cap_add:
      - NET_RAW      # Required for raw packet manipulation (nmap, etc.)
      - NET_ADMIN    # Required for network administration tasks
    environment:
      - TERM=xterm-256color
    volumes:
      - ./workspace:/workspace
      - ./tools:/tools
    labels:
      - "description=Kali Linux Pentesting Environment"
