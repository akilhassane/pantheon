<!DOCTYPE html>
<html>
<head>
  <title>PowerShell - Remote Terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <style>
    body { 
      margin: 0; 
      padding: 0; 
      background: #012456;
      overflow: hidden;
    }
    #terminal { 
      width: 100vw;
      height: 100vh;
      padding: 10px;
    }
    .xterm {
      height: 100%;
    }
    .xterm-viewport {
      background-color: #012456 !important;
    }
    .xterm-screen {
      background-color: #012456 !important;
    }
    #status {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 8px 12px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 11px;
      z-index: 1000;
    }
    .status-connecting { color: #F9F1A5; }
    .status-connected { color: #13A10E; }
    .status-error { color: #E74856; }
  </style>
</head>
<body>
  <div id="status" class="status-connecting">Connecting...</div>
  <div id="terminal"></div>
  
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script>
    const statusEl = document.getElementById('status');
    
    function updateStatus(message, className) {
      statusEl.textContent = message;
      statusEl.className = className;
      setTimeout(() => {
        statusEl.style.display = 'none';
      }, 3000);
    }
    
    const term = new Terminal({
      cursorBlink: true,
      cursorStyle: 'block',
      fontFamily: 'Consolas, "Courier New", monospace',
      fontSize: 12,
      theme: {
        background: '#012456',
        foreground: '#EEEDF0',
        cursor: '#EEEDF0',
        cursorAccent: '#012456',
        black: '#000000',
        red: '#E74856',
        green: '#13A10E',
        yellow: '#F9F1A5',
        blue: '#3B78FF',
        magenta: '#881798',
        cyan: '#3A96DD',
        white: '#CCCCCC',
        brightBlack: '#767676',
        brightRed: '#E74856',
        brightGreen: '#13A10E',
        brightYellow: '#F9F1A5',
        brightBlue: '#3B78FF',
        brightMagenta: '#B4009E',
        brightCyan: '#61D6D6',
        brightWhite: '#F2F2F2'
      }
    });
    
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    
    term.open(document.getElementById('terminal'));
    fitAddon.fit();
    
    // Get or create session ID
    let sessionId = localStorage.getItem('terminalSessionId');
    
    // Auto-detect protocol and build WebSocket URL
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const hostname = window.location.hostname;
    
    // For tunnel access, use the same hostname
    // The tunnel should proxy both HTTP and WebSocket traffic
    const wsUrl = `${protocol}//${hostname}${window.location.port ? ':' + window.location.port : ''}`;
    
    console.log('🔗 Terminal WebSocket Configuration:', {
      pageProtocol: window.location.protocol,
      wsProtocol: protocol,
      hostname,
      port: window.location.port,
      baseWsUrl: wsUrl
    });
    
    if (!sessionId) {
      // Fetch shared session ID from server
      fetch('/session')
        .then(r => r.json())
        .then(data => {
          sessionId = data.sessionId;
          localStorage.setItem('terminalSessionId', sessionId);
          connectWebSocket(sessionId);
        })
        .catch(err => {
          console.error('Failed to get session ID:', err);
          // Generate a random session ID as fallback
          sessionId = 'session-' + Math.random().toString(36).substr(2, 9);
          localStorage.setItem('terminalSessionId', sessionId);
          connectWebSocket(sessionId);
        });
    } else {
      connectWebSocket(sessionId);
    }
    
    function connectWebSocket(sessionId) {
      const fullWsUrl = `${wsUrl}?sessionId=${sessionId}`;
      
      console.log('🔗 Connecting to:', fullWsUrl);
      updateStatus('Connecting...', 'status-connecting');
      
      const ws = new WebSocket(fullWsUrl);
      
      ws.onopen = () => {
        console.log('✓ Connected to PowerShell terminal');
        updateStatus('Connected', 'status-connected');
        
        // Send terminal size IMMEDIATELY before focusing
        ws.send(JSON.stringify({
          type: 'resize',
          cols: term.cols,
          rows: term.rows
        }));
        
        term.focus();
      };
    
      ws.onmessage = (event) => {
        term.write(event.data);
        // Scroll to bottom when new content arrives
        term.scrollToBottom();
      };
      
      term.onData((data) => {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(data);
        }
      });
      
      term.onResize((size) => {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({
            type: 'resize',
            cols: size.cols,
            rows: size.rows
          }));
        }
      });
      
      window.addEventListener('resize', () => {
        fitAddon.fit();
      });
      
      // Connection stability improvements
      let reconnectAttempts = 0;
      const maxReconnectAttempts = 5;
      
      function reconnect() {
        if (reconnectAttempts < maxReconnectAttempts) {
          reconnectAttempts++;
          term.write(`\r\n\x1b[33mReconnecting... (attempt ${reconnectAttempts}/${maxReconnectAttempts})\x1b[0m\r\n`);
          updateStatus(`Reconnecting (${reconnectAttempts}/${maxReconnectAttempts})`, 'status-connecting');
          setTimeout(() => {
            window.location.reload();
          }, 2000);
        } else {
          term.write('\r\n\x1b[31mMax reconnection attempts reached. Please refresh the page.\x1b[0m\r\n');
          updateStatus('Connection failed', 'status-error');
        }
      }
      
      ws.onerror = (error) => {
        console.error('✗ WebSocket error:', error);
        term.write('\r\n\x1b[31mConnection error!\x1b[0m\r\n');
        updateStatus('Connection error', 'status-error');
      };
      
      ws.onclose = (event) => {
        console.log('✗ WebSocket closed:', event.code, event.reason);
        term.write('\r\n\x1b[31mConnection closed!\x1b[0m\r\n');
        updateStatus('Disconnected', 'status-error');
        if (event.code !== 1000) { // Not a normal closure
          reconnect();
        }
      };
    }
  </script>
</body>
</html>
