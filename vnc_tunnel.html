<!DOCTYPE html>
<html>
<head>
    <title>Windows 11 Desktop</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent;
            position: fixed;
            top: 0;
            left: 0;
        }
        #screen {
            width: 100vw !important;
            height: 100vh !important;
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            z-index: 1;
            overflow: hidden !important;
        }
        /* Canvas fills entire screen for proper mouse tracking */
        #screen canvas {
            display: block !important;
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            z-index: 1;
        }
        /* Hide noVNC UI elements with CSS only */
        .noVNC_status,
        .noVNC_control_bar,
        #noVNC_status,
        #top_bar,
        #status,
        #sendCtrlAltDelButton {
            display: none !important;
            visibility: hidden !important;
        }
    </style>
</head>
<body>
    <div id="screen"></div>

    <script type="module">
        import RFB from '/core/rfb.js';

        let rfb;

        function connectVNC() {
            // Auto-detect protocol: use wss:// for HTTPS, ws:// for HTTP
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const hostname = window.location.hostname;
            const port = window.location.port || (protocol === 'wss:' ? '443' : '8006');
            
            // For Cloudflare tunnels, don't include port in URL
            const portSuffix = (protocol === 'wss:' && port === '443') || (protocol === 'ws:' && port === '80') 
                ? '' 
                : `:${port}`;
            
            const url = `${protocol}//${hostname}${portSuffix}/websockify`;
            
            console.log('🔗 VNC Connection Details:', {
                protocol: window.location.protocol,
                wsProtocol: protocol,
                hostname,
                port,
                fullUrl: url
            });

            const screenElement = document.getElementById('screen');
            rfb = new RFB(screenElement, url, {
                credentials: { password: '' }
            });

            // Enable dynamic Windows VM resolution changes
            rfb.scaleViewport = true;   // Scale the display
            rfb.resizeSession = true;   // Request Windows VM to change its actual resolution
            rfb.viewOnly = false;
            rfb.clipViewport = false;
            rfb.dragViewport = false;

            // Enable quality settings for better mouse tracking
            rfb.qualityLevel = 6;
            rfb.compressionLevel = 2;

            rfb.addEventListener('connect', () => {
                console.log('✓ Connected to Windows 11 VNC');
                // Remove status elements after connection
                setTimeout(() => {
                    removeStatusElements();
                    // Force canvas to fill viewport
                    forceCanvasResize();
                    window.dispatchEvent(new Event('resize'));
                }, 500);
            });

            rfb.addEventListener('disconnect', (e) => {
                console.error('✗ VNC Disconnected:', e);
            });

            rfb.addEventListener('securityfailure', (e) => {
                console.error('✗ VNC Security Failure:', e);
            });

            // Handle window resize - recalculate canvas size dynamically
            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    forceCanvasResize();
                }, 100);
            });
        }

        function removeStatusElements() {
            // Remove specific status elements
            const selectors = ['#top_bar', '#status', '#sendCtrlAltDelButton', '.noVNC_status', '.noVNC_control_bar'];
            selectors.forEach(selector => {
                document.querySelectorAll(selector).forEach(el => el.remove());
            });

            // Remove text nodes containing status text
            const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
            const nodesToRemove = [];
            let node;
            while (node = walker.nextNode()) {
                const text = node.textContent.trim();
                if (text && (text.includes('Connected to') || text.includes('Send Ctrl') || text.includes('CtrlAltDel'))) {
                    nodesToRemove.push(node);
                }
            }
            nodesToRemove.forEach(n => n.remove());
        }

        function forceCanvasResize() {
            const canvas = document.querySelector('#screen canvas');
            if (!canvas) return;

            // Force canvas to fill 100% for accurate mouse tracking
            canvas.style.position = 'absolute';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.width = '100%';
            canvas.style.height = '100%';

            console.log(`Canvas: ${canvas.width}x${canvas.height}, Viewport: ${window.innerWidth}x${window.innerHeight}`);
        }

        // Run cleanup and resize periodically
        setInterval(() => {
            removeStatusElements();
            forceCanvasResize();
        }, 1000);

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', connectVNC);
        } else {
            connectVNC();
        }
    </script>
</body>
</html>
