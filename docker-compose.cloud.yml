version: '3.8'

# Pantheon Cloud Deployment - Frontend + Backend only
# Windows containers run on client machines via agent

services:
  # Frontend - Next.js web application
  frontend:
    image: akilhassane/pantheon:frontend
    container_name: pantheon-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_API_URL=${BACKEND_URL}
    restart: unless-stopped
    networks:
      - pantheon-network

  # Backend - Node.js API server (with remote container support)
  backend:
    image: akilhassane/pantheon:backend
    container_name: pantheon-backend
    ports:
      - "3002:3002"
    environment:
      # Supabase
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      
      # AI Providers
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      
      # Remote container mode
      - CONTAINER_MODE=remote
      - AGENT_API_SECRET=${AGENT_API_SECRET}
      
      # Server config
      - PORT=3002
      - NODE_ENV=production
    volumes:
      # No Docker socket needed - using remote agents
      - pantheon-data:/app/data
    restart: unless-stopped
    networks:
      - pantheon-network

  # Windows Tools API
  windows-tools-api:
    image: akilhassane/pantheon:windows-tools-api
    container_name: pantheon-windows-tools
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    restart: unless-stopped
    networks:
      - pantheon-network

networks:
  pantheon-network:
    driver: bridge

volumes:
  pantheon-data:
    driver: local
