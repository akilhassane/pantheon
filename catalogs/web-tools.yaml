# Web Application Security Testing Tools Catalog
name: "Web Application Security Tools"
version: "1.0.0"
category: "web"
description: "Comprehensive catalog of web application security testing tools"

tools:
  - name: "sqlmap"
    description: "Automatic SQL injection and database takeover tool"
    category: "injection"
    usage: "sqlmap -u 'http://target.com/vuln?id=1' --dbs"
    risk_level: "medium"
    tags: ["sql-injection", "database", "automation"]

  - name: "nikto"
    description: "Web server scanner"
    category: "scanner"
    usage: "nikto -h target.com"
    risk_level: "low"
    tags: ["web-server", "scanner", "vulnerabilities"]

  - name: "dirbuster"
    description: "Web content scanner"
    category: "enumeration"
    usage: "dirbuster"
    risk_level: "low"
    tags: ["directory", "enumeration", "content-discovery"]

  - name: "owasp-zap"
    description: "OWASP Zed Attack Proxy"
    category: "proxy"
    usage: "zap.sh"
    risk_level: "low"
    tags: ["proxy", "scanner", "intercepting"]

methodologies:
  - name: "web-app-testing"
    phases:
      - "Information Gathering"
      - "Configuration Management Testing"
      - "Identity Management Testing"
      - "Authentication Testing"
      - "Authorization Testing"
      - "Session Management Testing"
      - "Input Validation Testing"
      - "Error Handling"
      - "Cryptography"
      - "Business Logic Testing"
      - "Client-side Testing"

vulnerabilities:
  - name: "SQL Injection"
    cwe: "CWE-89"
    description: "Injection of malicious SQL code"
    impact: "high"
    likelihood: "high"

  - name: "Cross-Site Scripting (XSS)"
    cwe: "CWE-79"
    description: "Injection of malicious scripts into web pages"
    impact: "medium"
    likelihood: "high"

  - name: "Cross-Site Request Forgery (CSRF)"
    cwe: "CWE-352"
    description: "Forced execution of unwanted actions"
    impact: "medium"
    likelihood: "medium"

metadata:
  author: "akilhassane"
  last_updated: "2024-12-31"
  total_tools: 4



